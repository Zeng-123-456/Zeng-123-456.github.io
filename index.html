><div class="setting-section"><div class="setting-title-row"><label class="setting-label" style="font-size:13px;font-weight:600;color:var(--text);display:block;margin:0">👤 我的名字</label> <span style="font-size:11px;color:var(--muted)">左右滑动选择</span></div><div class="name-carousel" id="nameCarousel" style="display:flex;gap:10px;overflow-x:auto;padding:8px 0;scroll-behavior:smooth;-webkit-overflow-scrolling:touch"></div><div style="margin-top:12px;display:flex;justify-content:flex-end"><button class="btn small primary" id="saveNameBtn" style="padding:7px 16px;border-radius:10px;font-size:12px">保存选择</button></div></div><div class="setting-section"><div class="setting-title-row"><label class="setting-label" style="font-size:13px;font-weight:600;color:var(--text);display:block;margin:0">👁️ 查看模式</label></div><div class="mode-switch" style="display:flex;background:var(--bg);padding:4px;border-radius:10px;gap:4px;border:1px solid var(--line)"><button class="btn small" id="viewAllBtn" style="flex:1;border:none;background:0 0;border-radius:8px;padding:10px;font-size:13px">全部</button> <button class="btn small" id="viewMeBtn" style="flex:1;border:none;background:0 0;border-radius:8px;padding:10px;font-size:13px">只看自己</button></div></div><div class="setting-section"><div class="switch-card"><div><div class="switch-card-title">📋 多选模式</div><div class="switch-card-desc">开启后可批量复制选中人员</div></div><div id="multiselectToggle" onclick="toggleMultiselect()" style="width:36px;height:20px;background:0 0;border:2px solid var(--line);border-radius:10px;cursor:pointer;transition:all .2s ease;position:relative"><div id="multiselectKnob" style="position:absolute;top:2px;left:2px;width:12px;height:12px;background:var(--line);border-radius:50%;transition:all .2s ease"></div></div></div></div><div class="setting-section"><div class="setting-title-row"><label class="setting-label" style="font-size:13px;font-weight:600;color:var(--text);display:block;margin:0">📌 已保存人员</label></div><div class="saved-names-box"><div class="saved-names-list" id="savedNamesList"></div></div></div><div class="settings-actions"><button class="btn small danger" id="reset" type="button" style="width:100%;padding:12px;border-radius:12px;font-weight:600;background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.2)">重置所有配置</button></div></div></div><div id="drawerOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:999;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease"></div><div class="topbar"><div class="title"><h1>大小周查看器</h1></div><div class="monthnav" style="display:flex;gap:8px;align-items:center"><button class="btn small" id="settingsBtn" type="button">设置</button> <button class="btn small" id="prevMonth" type="button">上月</button> <button class="btn small" id="nextMonth" type="button">下月</button></div></div><div class="calendar"><div class="calendar-inner"><div class="row" style="justify-content:space-between"><div class="tag" id="monthLabel">-</div><div class="row" style="gap:8px"><button class="btn small" id="goToday" type="button">今天</button></div></div><div class="calgrid" id="dow"></div><div class="calgrid" id="cal"></div><div class="weather-card" id="weatherCard" style="margin-top:12px;padding:20px;background:rgba(255,255,255,var(--alpha));border-radius:14px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:102px"><div class="barrage-container" id="weatherBarrageContainer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none"><div class="barrage-track" id="weatherBarrageTrack" style="position:absolute;top:0;left:0;width:100%;height:100%"></div></div><div class="weather-main"><div class="weather-left"><span class="weather-icon" id="weatherIcon" style="font-size:32px">🌸</span><div><div class="weather-season" id="weatherSeason" style="font-size:14px;font-weight:600;color:var(--text)">春季</div><div class="weather-tip" id="weatherTip" style="font-size:12px;color:var(--muted)">春暖花开</div></div></div><div class="weather-meta"><span class="weather-time" id="weatherTime">10:00:00</span> <span>·</span> <span class="weather-temp" id="weatherTemp">22°C</span></div></div><div class="weather-quote" id="weatherQuote">今天也要加油鸭</div></div><div class="progress-panel" id="progressPanel" style="margin-top:12px;padding:18px 20px;background:rgba(255,255,255,var(--alpha));border-radius:14px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden"><div class="barrage-container" id="progressBarrageContainer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none"><div class="barrage-track" id="progressBarrageTrack" style="position:absolute;top:0;left:0;width:100%;height:100%"></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:relative;z-index:1"><span style="font-size:14px;font-weight:600;color:var(--text)">📅 本周进度</span> <span class="month-progress-text" id="monthProgressText" style="font-size:13px;color:var(--brand);font-weight:600">0%</span></div><div class="progress-bar" style="height:10px;background:rgba(124,92,255,.15);border-radius:5px;overflow:hidden"><div class="month-progress-fill" id="monthProgressFill" style="height:100%;width:0%;background:linear-gradient(90deg,var(--brand),#a78bfa);border-radius:5px;transition:width .3s ease"></div></div><div style="display:flex;justify-content:space-between;margin-top:12px;font-size:13px;color:var(--text)"><span>本周已过 <span class="week-day-count" id="weekDayCount" style="color:var(--brand);font-weight:600">0</span> 天</span> <span>距周末还有 <span class="daysToWeekend" id="daysToWeekend" style="color:var(--brand);font-weight:600">0</span> 天</span></div></div><div class="salary-panel" id="salaryPanel" style="margin-top:12px;padding:18px 20px;background:rgba(255,255,255,var(--alpha));border-radius:14px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden"><div class="barrage-container" id="salaryBarrageContainer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none"><div class="barrage-track" id="salaryBarrageTrack" style="position:absolute;top:0;left:0;width:100%;height:100%"></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:relative;z-index:1"><span style="font-size:14px;font-weight:600;color:var(--text)">💰 发薪日</span> <span class="salary-date" id="salaryDate" style="font-size:13px;color:var(--brand);font-weight:600">-</span></div><div class="salary-countdown" id="salaryCountdown" style="font-size:20px;font-weight:700;color:var(--text);text-align:center;padding:8px 0;position:relative;z-index:1">-</div></div></div></div></section></div><div class="barrage-container" id="barrageContainer" style="position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;z-index:0;pointer-events:none;overflow:hidden"><div class="barrage-track" id="barrageTrack" style="position:absolute;top:0;left:0;width:100%;height:100%"></div></div><div id="resultsDrawer" class="drawer"><div class="drawer-header" style="display:flex;justify-content:space-between;align-items:center;padding:20px 20px 16px;border-bottom:1px solid var(--line)"><div class="meta"><div class="big" id="selectedTitle">请选择一个周六</div><div class="small" id="selectedHint">点击日历中的周六"查看"</div></div><button class="btn small" id="closeResultsDrawerBtn">✕</button></div><div class="drawer-body" style="padding:0;flex:1;overflow:auto;display:flex;flex-direction:column"><div class="row" style="gap:8px;padding:12px 16px;border-bottom:1px solid var(--line)"><button class="btn small" id="copyText" type="button">复制文本</button></div><div class="multiselect-bar" id="multiselectBar" style="display:none;padding:10px 16px;border-bottom:1px solid var(--line);background:rgba(124,92,255,.05);align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div class="row" style="gap:8px;align-items:center"><button class="btn small" id="selectAllBtn">全选</button> <button class="btn small" id="clearSelectionBtn">清空</button> <span id="selectedCount" style="font-size:12px;color:var(--muted)">已选 0 人</span></div><button class="btn small primary" id="copySelectedBtn">复制已选</button></div><div class="split" id="splitContainer" style="flex:1;position:relative"><div class="barrage-container" id="resultsBarrageContainer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none"><div class="barrage-track" id="resultsBarrageTrack" style="position:absolute;top:0;left:0;width:100%;height:100%"></div></div><div class="card" id="workCard" style="position:relative;z-index:1"><div class="cardhead"><div class="name">单休</div><div class="badge" id="workCount">0 人</div></div><div class="list" id="workList"></div></div><div class="card" id="restCard" style="position:relative;z-index:1"><div class="cardhead"><div class="name" style="color:#d8c4ff">双休</div><div class="badge" id="restCount">0 人</div></div><div class="list" id="restList"></div></div></div></div></div><div id="resultsDrawerOverlay"></div><script src="./app.obf.js"></script></body></html>
