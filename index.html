<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>大小休查看器</title>
<style>
  :root{
    --bg:#f8fafc;
    --panel:#ffffff;
    --text:#1e293b;
    --muted:#64748b;
    --line:rgba(0,0,0,.08);
    --brand:#7c5cff;
    --ok:#22c55e;
    --danger:#ef4444;
    --shadow:0 10px 30px rgba(0,0,0,.08);
    --alpha: 1; /* 不透明 */
  }
  *{box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
  html,body{width:100%;height:100%;margin:0;padding:0;background:radial-gradient(1200px 600px at 10% 10%, rgba(124,92,255,.12), transparent 60%),radial-gradient(900px 500px at 90% 20%, rgba(34,197,94,.10), transparent 60%),var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;overflow:auto}
  button,input,textarea{font:inherit}

  .app{height:100%;display:flex;gap:14px;padding:14px;max-width:1280px;margin:0 auto}
  .left,.right{background:rgba(255,255,255,var(--alpha));border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
  .left{flex:0 0 400px;min-width:360px;display:flex;flex-direction:column;min-height:0}
  .right{flex:1;display:flex;flex-direction:column;min-width:300px}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--line);gap:10px;background:rgba(255,255,255,var(--alpha))}
  .title{display:flex;flex-direction:column;gap:2px}
  .title h1{font-size:16px;line-height:1.1;margin:0}
  .title p{margin:0;color:var(--muted);font-size:12px}

  .monthnav{display:flex;align-items:center;gap:8px}
  .btn{border:1px solid var(--line);background:rgba(255,255,255,var(--alpha));color:var(--text);border-radius:10px;padding:8px 14px;cursor:pointer;transition:all .2s ease;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-weight:500}
  .btn:hover{transform:translateY(-2px);border-color:var(--brand);box-shadow:0 4px 12px rgba(124,92,255,.15)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:linear-gradient(135deg, rgba(124,92,255,.15), rgba(124,92,255,.08));border-color:rgba(124,92,255,.3);color:var(--brand)}
  .btn.primary:hover{background:linear-gradient(135deg, rgba(124,92,255,.25), rgba(124,92,255,.12));box-shadow:0 4px 16px rgba(124,92,255,.25)}
  .btn.success{background:linear-gradient(135deg, rgba(34,197,94,.12), rgba(34,197,94,.06));border-color:rgba(34,197,94,.25);color:#16a34a}
  .btn.danger{background:linear-gradient(135deg, rgba(239,68,68,.1), rgba(239,68,68,.05));border-color:rgba(239,68,68,.25);color:#dc2626}
  .btn.small{padding:6px 12px;border-radius:20px;font-size:12px}

  .calendar{
    padding:12px 14px 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
    min-height:200px;
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(700px 320px at 15% 15%, rgba(124,92,255,.10), transparent 60%),
      radial-gradient(700px 320px at 85% 70%, rgba(34,197,94,.08), transparent 60%),
      linear-gradient(180deg, rgba(255,255,255,var(--alpha)), rgba(255,255,255,var(--alpha) * 0.95));
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .calendar-inner{position:relative;z-index:1;}
  .calgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .dow{color:var(--muted);font-size:12px;text-align:center;padding:4px 0}
  .day{border:1px solid var(--line);background:rgba(255,255,255,var(--alpha));border-radius:14px;padding:10px;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .2s ease;cursor:pointer}
  .day:hover{transform:translateY(-2px);border-color:var(--brand);box-shadow:0 4px 16px rgba(124,92,255,.12)}
  .day.muted{opacity:.4;background:rgba(255,255,255,.4)}
  .day.today{border-color:var(--brand);background:linear-gradient(135deg, rgba(124,92,255,.12), rgba(124,92,255,.04));box-shadow:0 0 0 2px rgba(124,92,255,.2)}
  .day.today .num{color:var(--brand);font-weight:700}
  .day.selected{border-color:var(--brand);background:rgba(124,92,255,0.05);box-shadow:0 0 0 1px var(--brand);}
  .day .num{font-size:15px;font-weight:600;text-align:center}
  .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,var(--alpha) * 0.8);border:1px solid var(--line);padding:4px 8px;border-radius:999px;color:var(--muted);font-size:12px;width:max-content}
  .tag.sat{color:#7c5cff;border-color:rgba(124,92,255,.20);background:rgba(124,92,255,.08)}
  .tag.sun{color:#ef4444;border-color:rgba(239,68,68,.20);background:rgba(239,68,68,.06)}
  .day .actions{margin-top:auto;display:flex;gap:8px;flex-wrap:wrap}

  .panel{padding:14px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;background:rgba(255,255,255,var(--alpha))}
  .panel .meta{display:flex;flex-direction:column;gap:4px}
  .panel .meta .big{font-size:15px;font-weight:700}
  .panel .meta .small{font-size:12px;color:var(--muted)}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px;overflow:auto;background:rgba(255,255,255,var(--alpha))}
  .card{border:1px solid var(--line);background:rgba(255,255,255,var(--alpha));border-radius:16px;overflow:hidden;display:flex;flex-direction:column;min-height:280px;box-shadow:var(--shadow);transition:transform .2s ease}
  .card:hover{transform:translateY(-2px)}
  .cardhead{padding:12px 12px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,var(--alpha))}
  .cardhead .name{font-weight:750}
  .badge{font-size:13px;color:var(--brand);background:linear-gradient(135deg, rgba(124,92,255,.12), rgba(124,92,255,.06));border:1px solid rgba(124,92,255,.2);border-radius:999px;padding:5px 12px;font-weight:600}
  .list{padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow:auto;background:rgba(255,255,255,var(--alpha) * 0.95)}
  .item{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,var(--alpha) * 0.9);transition:all .2s ease;cursor:pointer}
  .item:hover{border-color:var(--brand);transform:translateX(4px);box-shadow:0 2px 8px rgba(124,92,255,.1)}
  .item input{
  width:16px;
  height:16px;
  accent-color: #d8c4ff; /* 这一行就是选中变色 */
}

  .config{padding:14px;display:flex;flex-direction:column;gap:12px;border-top:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,var(--alpha)), rgba(255,255,255,var(--alpha) * 0.9))}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  label{font-size:12px;color:var(--muted)}
  .field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:220px}
  .input,.ta{border:1px solid var(--line);background:rgba(255,255,255,var(--alpha) * 0.8);color:var(--text);border-radius:12px;padding:10px 12px;outline:none}
  .ta{min-height:96px;resize:vertical;line-height:1.35}
  .help{font-size:12px;color:var(--muted)}

  @media (max-width: 980px){
    html,body{height:auto}
    .app{flex-direction:column;height:auto;min-height:100%}
    .left{flex:0 0 auto}
    .split{grid-template-columns:1fr 1fr;gap:8px}
    .card{min-height:160px}
    .list{padding:6px 8px}
    .cardhead{padding:8px 10px 6px}
  }
 
  @media (max-width: 600px){
    html,body{height:100%;}
    .app{padding:10px;gap:10px}
    .app{min-height:100vh;}
    .left{min-width:0;flex:1;min-height:100vh;}
    .right{min-width:0}
    .topbar{padding:12px}
    .monthnav{gap:6px}
    .btn{padding:8px 12px}
    .btn.small{padding:6px 10px}
    .calendar{padding:10px}
    .calgrid{gap:6px}
    .day{min-height:56px;padding:8px;border-radius:12px}
    .day .num{font-size:14px}
    .panel{padding:12px}
    .split{grid-template-columns:1fr;gap:12px;padding:12px}
    .card{min-height:220px}
    #settingsDrawer{width:100%;max-width:100%}
  }
 
  @media (max-width: 420px){
    .app{padding:8px}
    .topbar{flex-direction:column;align-items:flex-start}
    .monthnav{width:100%;justify-content:space-between}
    .calgrid{gap:5px}
    .day{min-height:52px;padding:7px}
    .btn{padding:8px 10px}
  }
  .drawer{transition:transform .3s ease;}
  .drawer-header{display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--line);}
  .drawer-body{padding:16px;flex:1;overflow:auto;}
  
  /* 结果抽屉 */
  #resultsDrawer{
    position:fixed;
    top:0;
    right:0;
    width:300px;
    max-width:100%;
    height:100vh;
    background:rgba(255,255,255,0.98);
    z-index:1100;
    transform:translateX(100%);
    transition:transform .3s ease;
    box-shadow:-10px 0 40px rgba(0,0,0,0.15);
    border-left:1px solid var(--line);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    border-radius:20px 0 0 20px;
  }
  #resultsDrawer.open{transform:translateX(0)}
  #resultsDrawerOverlay{
    position:fixed;
    inset:0;
    z-index:1099;
    background:rgba(0,0,0,.3);
    opacity:0;
    visibility:hidden;
    transition:opacity .3s ease,visibility .3s ease;
  }
  #resultsDrawerOverlay.open{opacity:1;visibility:visible}
  
  /* 底部粒子特效 */
  .particles-container{
    position:relative;
    height:60px;
    overflow:hidden;
    margin-top:10px;
    border-radius:12px;
  }
  .particle{
    position:absolute;
    bottom:-10px;
    width:8px;
    height:8px;
    background:linear-gradient(135deg, rgba(124,92,255,.6), rgba(124,92,255,.3));
    border-radius:50%;
    animation:float-up 4s ease-in-out infinite;
  }
  .particle:nth-child(1){left:10%;animation-delay:0s;width:6px;height:6px;background:linear-gradient(135deg, rgba(124,92,255,.5), rgba(34,197,94,.3));}
  .particle:nth-child(2){left:20%;animation-delay:.5s;width:10px;height:10px;}
  .particle:nth-child(3){left:30%;animation-delay:1s;width:5px;height:5px;background:linear-gradient(135deg, rgba(34,197,94,.5), rgba(124,92,255,.3));}
  .particle:nth-child(4){left:40%;animation-delay:1.5s;width:8px;height:8px;}
  .particle:nth-child(5){left:50%;animation-delay:2s;width:7px;height:7px;background:linear-gradient(135deg, rgba(239,68,68,.4), rgba(124,92,255,.3));}
  .particle:nth-child(6){left:60%;animation-delay:2.5s;width:9px;height:9px;}
  .particle:nth-child(7){left:70%;animation-delay:3s;width:6px;height:6px;}
  .particle:nth-child(8){left:80%;animation-delay:3.5s;width:8px;height:8px;background:linear-gradient(135deg, rgba(124,92,255,.5), rgba(239,68,68,.3));}
  
  @keyframes float-up{
    0%{transform:translateY(0) scale(1);opacity:0;}
    10%{opacity:1;}
    90%{opacity:1;}
    100%{transform:translateY(-70px) scale(.5);opacity:0;}
  }
  
  .multiselect-bar{display:flex;background:rgba(255,255,255,var(--alpha));}
  .multiselect-bar .btn{padding:6px 14px;}
  
  /* 设置抽屉样式优化 */
  .name-list{
    max-height:220px;
    overflow-y:auto;
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px;
    background:#fff;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.02);
  }
  .name-tags{
    max-height:180px;
    overflow-y:auto;
    padding:4px;
  }
  .name-carousel{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:8px 0;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }
  .name-carousel::-webkit-scrollbar{height:4px;}
  .name-carousel::-webkit-scrollbar-thumb{background:rgba(124,92,255,.3);border-radius:2px;}
  .name-carousel::-webkit-scrollbar-track{background:transparent;}
  .name-chip{
    flex-shrink:0;
    display:inline-flex;
    align-items:center;
    padding:10px 16px;
    border-radius:24px;
    font-size:13px;
    cursor:pointer;
    border:1px solid var(--line);
    background:#fff;
    transition:all .2s ease;
    white-space:nowrap;
  }
  .name-chip:hover{
    border-color:var(--brand);
    transform:scale(1.02);
  }
  .name-chip.selected{
    background:linear-gradient(135deg, var(--brand), #a78bfa);
    border-color:var(--brand);
    color:#fff;
    font-weight:600;
    box-shadow:0 4px 12px rgba(124,92,255,.3);
  }
  .name-tag{
    display:inline-flex;
    align-items:center;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
    border:1px solid var(--line);
    background:rgba(255,255,255,var(--alpha));
    transition:all .2s ease;
  }
  .name-tag:hover{
    border-color:var(--brand);
    background:rgba(124,92,255,.05);
  }
  .name-tag.selected{
    background:linear-gradient(135deg, rgba(124,92,255,.15), rgba(124,92,255,.08));
    border-color:var(--brand);
    color:var(--brand);
    font-weight:600;
  }
  .name-list::-webkit-scrollbar{width:6px;}
  .name-list::-webkit-scrollbar-thumb{background:rgba(124,92,255,.3);border-radius:3px;}
  .name-list::-webkit-scrollbar-track{background:transparent;}
  
  .name-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-radius:8px;
    cursor:pointer;
    transition:background .2s;
    font-size:14px;
  }
  .name-item:hover{background:rgba(124,92,255,.06);}
  .name-item input[type="checkbox"]{
    width:18px;
    height:18px;
    accent-color:var(--brand);
    cursor:pointer;
    flex-shrink:0;
  }
  .name-item span{flex:1;}
  .name-item.checked{background:rgba(124,92,255,.1);}
  
  .selected-badge{
    display:inline-flex;
    align-items:center;
    padding:4px 12px;
    background:linear-gradient(135deg, rgba(124,92,255,.15), rgba(124,92,255,.08));
    border:1px solid rgba(124,92,255,.2);
    border-radius:20px;
    font-size:13px;
    color:var(--brand);
    font-weight:500;
  }
  
  .setting-section{
    margin-bottom:24px;
    padding-bottom:20px;
    border-bottom:1px solid var(--line);
  }
  .drawer{
    box-shadow: 10px 0 50px rgba(0,0,0,0.1);
    border-right: 1px solid var(--line);
  }
  .drawer-header{
    padding: 20px 24px !important;
    background: linear-gradient(to bottom, #fff, var(--bg)) !important;
  }
  .setting-section{
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--line);
    transition: all 0.3s ease;
  }
  .setting-section:hover{
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    border-color: var(--brand);
  }
  .name-list{
    max-height: 240px;
    border-radius: 12px;
    background: var(--bg);
    padding: 8px;
    border: 1px inset var(--line);
  }
  .name-item{
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 4px;
    transition: all 0.2s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .name-item:hover{
    background: rgba(124,92,255,0.08);
  }
  .name-item.checked{
    background: rgba(124,92,255,0.12);
    color: var(--brand);
    font-weight: 600;
  }
  .name-item input[type="checkbox"]{
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  .mode-switch{
    display: flex;
    background: var(--bg);
    padding: 4px;
    border-radius: 12px;
    gap: 4px;
  }
  .mode-switch .btn{
    flex: 1;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
  }
  .mode-switch .btn.primary{
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .search-box{
    margin-bottom: 12px;
    position: relative;
  }
  .search-box input{
    width: 100%;
    padding: 10px 14px 10px 36px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg);
    font-size: 14px;
    outline: none;
    transition: all 0.2s ease;
  }
  .search-box input:focus{
    border-color: var(--brand);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(124,92,255,0.1);
  }
  .search-box::before{
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.5;
  }

  
  /* 多选工具栏手机端适配 */
  @media (max-width: 600px){
    .multiselect-bar{padding:8px 12px;}
    .multiselect-bar .btn{padding:5px 10px;font-size:11px;}
    .name-list{max-height:180px;}
  }
  /* 弹幕特效 */
  .barrage-container{
    position:relative;
    flex:1;
    height:auto;
    min-height:220px;
    overflow:hidden;
    background:
      radial-gradient(700px 320px at 15% 15%, rgba(124,92,255,.10), transparent 60%),
      radial-gradient(700px 320px at 85% 70%, rgba(34,197,94,.08), transparent 60%),
      linear-gradient(180deg, rgba(255,255,255,var(--alpha)), rgba(255,255,255,var(--alpha) * 0.92));
    border-radius:0 0 14px 14px;
    margin-top:0;
  }
  .barrage-track{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .barrage-item{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:6px 16px;
    border-radius:16px;
    font-size:14px;
    font-weight:500;
    white-space:nowrap;
    width:fit-content;
    box-shadow:0 6px 18px rgba(0,0,0,.06);
    transition: transform 0.3s ease;
  }
  .barrage-item.type-1{background:rgba(124,92,255,.15);color:#7c5cff;}
  .barrage-item.type-2{background:rgba(34,197,94,.15);color:#16a34a;}
  .barrage-item.type-3{background:rgba(236,72,153,.15);color:#db2777;}
  .barrage-item.type-4{background:rgba(59,130,246,.15);color:#2563eb;}
  .barrage-item.type-5{background:rgba(245,158,11,.15);color:#d97706;}

  .calendar{position:relative;}
  .calendar > .barrage-container{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    height:100%;
    width:100%;
    z-index:0;
    min-height:unset;
    margin:0;
    background:transparent;
    border:0;
    box-shadow:none;
    backdrop-filter:none;
    pointer-events:none;
  }
  .calendar-inner{position:relative;z-index:1;}

  .barrage-float{
    position:absolute;
    left:var(--x, 50%);
    top:var(--y, 50%);
    opacity:0;
    animation:barrage-elegant-fly var(--dur, 12s) cubic-bezier(0.4, 0, 0.2, 1) infinite;
    animation-delay:var(--delay, 0s);
    will-change: transform, opacity;
    pointer-events: none;
  }
  
  @keyframes barrage-elegant-fly{
    0% {
      transform: translate3d(var(--sx, 0), var(--sy, 0), 0) scale(0.5) rotate(var(--r1, 0deg));
      opacity: 0;
      filter: blur(8px);
    }
    15% {
      opacity: var(--op, 0.9);
      filter: blur(0);
    }
    85% {
      opacity: var(--op, 0.9);
      filter: blur(0);
    }
    100% {
      transform: translate3d(var(--ex, 0), var(--ey, 0), 0) scale(var(--s, 1.1)) rotate(var(--r2, 0deg));
      opacity: 0;
      filter: blur(4px);
    }
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <section class="left">
      <!-- 设置抽屉弹窗 -->
      <div id="settingsDrawer" class="drawer" style="position:fixed;top:0;left:0;width:300px;height:100vh;background:#fff;z-index:1000;transform:translateX(-100%);transition:transform .3s ease;box-shadow:4px 0 20px rgba(0,0,0,.15);overflow:hidden;display:flex;flex-direction:column;">
        <!-- 设置抽屉弹幕背景 -->
        <div class="barrage-container" id="settingsBarrageContainer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;">
          <div class="barrage-track" id="settingsBarrageTrack" style="position:absolute;top:0;left:0;width:100%;height:100%;"></div>

  // 公共弹幕创建函数
  function createBarrage(options){
    const {
      trackId,
      floatCount,
      offset = 200,
      spread = 150,
      durRange = [6, 14],
      delayRange = [0, 8],
      scaleRange = [0.5, 1.0],
      opacityRange = [0.3, 0.8],
      rotateRange = [-10, 10],
      pointerEventsNone = false
    } = options;
    
    const track = el(trackId);
    if(!track) return;

    const isMobile = window.matchMedia && window.matchMedia('(max-width: 600px)').matches;
    const count = typeof floatCount === 'function' ? floatCount(isMobile) : floatCount;

    const pick = () => BARRAGE_MESSAGES[Math.floor(Math.random() * BARRAGE_MESSAGES.length)];
    const rand = (min, max) => min + Math.random() * (max - min);

    track.innerHTML = '';

    function getElegantPath(){
      const side = Math.floor(Math.random() * 4);
      let sx, sy, ex, ey;

      if(side === 0){
        sx = rand(-20, 120) + '%'; sy = -offset + 'px';
        ex = rand(-spread, 100 + spread) + '%'; ey = '150%';
      } else if(side === 1){
        sx = '150%'; sy = rand(-20, 120) + '%';
        ex = -offset + 'px'; ey = rand(-spread, 100 + spread) + '%';
      } else if(side === 2){
        sx = rand(-20, 120) + '%'; sy = '150%';
        ex = rand(-spread, 100 + spread) + '%'; ey = -offset + 'px';
      } else {
        sx = -offset + 'px'; sy = rand(-20, 120) + '%';
        ex = '150%'; ey = rand(-spread, 100 + spread) + '%';
      }
      return { sx, sy, ex, ey };
    }

    function setNodeStyle(node){
      const path = getElegantPath();
      const dur = rand(durRange[0], durRange[1]).toFixed(2) + 's';
      const delay = rand(delayRange[0], delayRange[1]).toFixed(2) + 's';
      const s = rand(scaleRange[0], scaleRange[1]).toFixed(2);
      const op = rand(opacityRange[0], opacityRange[1]).toFixed(2);
      const r1 = rand(rotateRange[0], rotateRange[1]).toFixed(2) + 'deg';
      const r2 = rand(rotateRange[0], rotateRange[1]).toFixed(2) + 'deg';

      node.style.setProperty('--sx', path.sx);
      node.style.setProperty('--sy', path.sy);
      node.style.setProperty('--ex', path.ex);
      node.style.setProperty('--ey', path.ey);
      node.style.setProperty('--dur', dur);
      node.style.setProperty('--delay', delay);
      node.style.setProperty('--s', s);
      node.style.setProperty('--op', op);
      node.style.setProperty('--r1', r1);
      node.style.setProperty('--r2', r2);
    }

    function spawnOne(){
      const m = pick();
      const node = document.createElement('div');
      node.className = 'barrage-float';
      if(pointerEventsNone) node.style.pointerEvents = 'none';
      setNodeStyle(node);
      node.innerHTML = `<span class="barrage-item type-${m.type}">${m.text}</span>`;
      track.appendChild(node);
    }

    for(let i=0; i<count; i++){
      spawnOne();
    }
  }

      delayRange: [0, 6],
      scaleRange: [0.6, 0.9],

      rotateRange: [-8, 8]
    });
  }

  // 初始化卡片弹幕（天气、进度、发薪日）
  function initCardBarrages(){

  function pad2(n){ return String(n).padStart(2,'0'); }
  function toISODate(d){
    const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    return `${x.getFullYear()}-${pad2(x.getMonth()+1)}-${pad2(x.getDate())}`;
  }
  function parseISODate(s){
    if(!s) return null;
    const m = /^\s*(\d{4})-(\d{2})-(\d{2})\s*$/.exec(s);
    if(!m) return null;
    const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
    if(Number.isNaN(d.getTime())) return null;
    return d;
  }
  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function isSameDay(a,b){ return a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

  function normalizeNames(text){
    return String(text||'')
      .split(/\r?\n/)
      .map(s => s.trim())
      .filter(Boolean);
  }

  function findNearestSaturday(d){
    const x = startOfDay(d);
    const day = x.getDay();
    // 周日(0)返回本周六（向前6天），其他日期返回下一个周六
    if(day === 0){
      return new Date(x.getFullYear(), x.getMonth(), x.getDate() - 6);
    }
    const delta = (6 - day + 7) % 7;
    return new Date(x.getFullYear(), x.getMonth(), x.getDate() + delta);
  }

  function diffWeeks(a,b){
    // 获取日期所在周的周六（周日归到前一个周六）
    const getWeekSaturday = (d) => {
      const dow = d.getDay(); // 0=周日, 6=周六
      // 如果是周日(0)，找前一个周六（往前1天）
      // 如果是周一到周五(1-5)，找本周六（往后几天）
      // 如果是周六(6)，就是当天
      const daysToSat = dow === 0 ? -1 : (6 - dow);
      return new Date(d.getFullYear(), d.getMonth(), d.getDate() + daysToSat);
    };
    
    const satA = getWeekSaturday(startOfDay(a));
    const satB = getWeekSaturday(startOfDay(b));
    
    const ms = satA.getTime() - satB.getTime();
    return Math.round(ms / (7 * 24 * 60 * 60 * 1000));
  }

  function getRotation(anchorSat, targetSat){
    const k = diffWeeks(targetSat, anchorSat);
    const even = (Math.abs(k) % 2) === 0;
    return {
      weekIndex: k,
      groupAIsResting: even,
      groupBIsResting: !even
    };
  }

  function formatCNDate(d){
    const w = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
  }

  // 更新进度指示器
  function updateProgress(){
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    
    // 本月天数
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = now.getDate();
    const monthProgress = Math.round((today / daysInMonth) * 100);
    
    const monthProgressText = el('monthProgressText');
    const monthProgressFill = el('monthProgressFill');
    if(monthProgressText) monthProgressText.textContent = monthProgress + '%';
    if(monthProgressFill) monthProgressFill.style.width = monthProgress + '%';
    
    // 本周已过天数 (周一到周日，周一=1，周日=7)
    const dayOfWeek = now.getDay();
    const weekDay = (dayOfWeek + 6) % 7 + 1; // 转换为周一=1，周日=7
    const weekDayCount = el('weekDayCount');
    if(weekDayCount) weekDayCount.textContent = weekDay;
    
    // 获取本周六的日期
    const thisSaturday = findNearestSaturday(now);
    const anchor = parseISODate(state.cfg.anchorDate) || parseISODate(DEFAULT_ANCHOR_SAT);
    const rot = getRotation(anchor, thisSaturday);
    
    // 根据用户保存的名字判断当前周是单休还是双休
    const myNames = state.cfg.myNames || [];
    const a = normalizeNames(state.cfg.groupA);
    const b = normalizeNames(state.cfg.groupB);
    
    // 判断用户选中的人在当前周六是上班还是休息
    let isMyWeekend = false;
    if(myNames.length > 0){
      // 如果用户选中的人在A组
      const myInA = myNames.filter(n => a.includes(n));
      // 如果用户选中的人在B组
      const myInB = myNames.filter(n => b.includes(n));
      
      if(myInA.length > 0 || myInB.length > 0){
        // 根据轮换判断用户这周是否休息
        if(myInA.length > 0){
          // 用户在A组，根据当前周六A组是否休息来判断
          isMyWeekend = rot.groupAIsResting;
        }else{
          // 用户在B组
          isMyWeekend = rot.groupBIsResting;
        }
      }
    }
    
    // 如果没有保存名字，默认按双休计算
    // 距周末还有几天
    let daysToWeekend;
    if(isMyWeekend){
      // 用户这周休息（双休：周六日都休，单休：周日休）
      daysToWeekend = 0;
    }else{
      // 用户这周上班
      if(rot.groupAIsResting){
        // 双休周：这周六开始休息
        daysToWeekend = 6 - weekDay + 1;
      }else{
        // 单休周：这周日才开始休息
        daysToWeekend = 7 - weekDay + 1;
      }
    }
    
    const daysToWeekendEl = el('daysToWeekend');
    if(daysToWeekendEl) daysToWeekendEl.textContent = daysToWeekend > 0 ? daysToWeekend : 0;
  }

  // 更新天气卡片
  function updateWeather(){
    const now = new Date();
    const month = now.getMonth() + 1; // 1-12
    
    let season, icon, tip;
    if(month >= 3 && month <= 5){
      season = '春季';
      icon = '🌸';
      tip = '春暖花开';
    }else if(month >= 6 && month <= 8){
      season = '夏季';
      icon = '☀️';
      tip = '夏日炎炎';
    }else if(month >= 9 && month <= 11){
      season = '秋季';
      icon = '🍂';
      tip = '秋高气爽';
    }else{
      season = '冬季';
      icon = '❄️';
      tip = '寒意渐浓';
    }
    
    const weatherIcon = el('weatherIcon');
    const weatherSeason = el('weatherSeason');
    const weatherTip = el('weatherTip');
    const weatherTime = el('weatherTime');
    
    if(weatherIcon) weatherIcon.textContent = icon;
    if(weatherSeason) weatherSeason.textContent = season;
    if(weatherTip) weatherTip.textContent = tip;
    if(weatherTime) weatherTime.textContent = now.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  }

  // 计算发薪日（每月最后一天，如果是周六则周五，如果是周日则前两天周五）
  function getSalaryDate(year, month){
    const lastDay = new Date(year, month + 1, 0);
    const dayOfWeek = lastDay.getDay();
    let salaryDate = new Date(lastDay);
    
    if(dayOfWeek === 6){
      salaryDate.setDate(salaryDate.getDate() - 1);
    }else if(dayOfWeek === 0){
      salaryDate.setDate(salaryDate.getDate() - 2);
    }
    
    return salaryDate;
  }

  // 更新发薪日倒计时（基于当前日历视图月份）
  function updateSalaryCountdown(){
    const now = new Date();
    // 使用日历视图的年份和月份
    const viewYear = state.viewYear;
    const viewMonth = state.viewMonth;
    
    const salaryDate = getSalaryDate(viewYear, viewMonth);
    
    const salaryDateEl = el('salaryDate');
    const countdownEl = el('salaryCountdown');
    
    if(salaryDateEl){
      const isToday = salaryDate.toDateString() === now.toDateString();
      if(isToday){
        salaryDateEl.textContent = '今天';
      }else{
        salaryDateEl.textContent = `${salaryDate.getFullYear()}年${salaryDate.getMonth() + 1}月${salaryDate.getDate()}日`;
      }
    }
    
    if(countdownEl){
      const diff = salaryDate.getTime() - now.getTime();
      const isToday = salaryDate.toDateString() === now.toDateString();
      
      if(isToday){
        countdownEl.textContent = '🎉 今天发薪！🎉';
        countdownEl.style.color = 'var(--brand)';
      }else if(diff < 0){
        // 发薪日已过
        const daysPassed = Math.floor(Math.abs(diff) / (1000 * 60 * 60 * 24));
        const hoursPassed = Math.floor((Math.abs(diff) % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        countdownEl.textContent = `已过 ${daysPassed}天 ${hoursPassed}小时`;
        countdownEl.style.color = 'var(--muted)';
      }else{
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        countdownEl.textContent = `${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
        countdownEl.style.color = 'var(--text)';
      }
    }
  }

  function buildCalendar(){
    const y = state.viewYear;
    const m = state.viewMonth;
    el('monthLabel').textContent = `${y}年 ${m+1}月`;

    // 获取该月第一天是星期几 (0=周日, 1=周一...6=周六)
    const firstDayOfMonth = new Date(y, m, 1);
    const firstDayDow = firstDayOfMonth.getDay(); // 0-6
    
    // 转换为周一为0的索引: 周一=0, 周二=1, ... 周日=6
    const firstDowMonBased = (firstDayDow + 6) % 7;
    
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const prevDays = new Date(y, m, 0).getDate();

    const today = startOfDay(new Date());
    const anchor = parseISODate(state.cfg.anchorDate) || parseISODate(DEFAULT_ANCHOR_SAT) || findNearestSaturday(new Date());

    const cells = [];
    // 从该月第一天所在周的那个周一开始计算
    // firstDowMonBased 表示1号前面需要补几天上月的日期
    // 从 row 0, col 0 (周一) 开始，i = row*7 + col
    for(let row=0; row<6; row++){
      // 本周的周一日期
      const weekStartOffset = row * 7 - firstDowMonBased;
      const mondayDate = new Date(y, m, 1 + weekStartOffset);
      
      // 每周第1列：查看按钮（对应本周的周六）
      const satDate = findNearestSaturday(mondayDate);
      cells.push(`
        <div class="view-btn-col" style="display:flex;align-items:center;justify-content:center;">
          <button class="btn small primary" onclick="selectSaturday(parseISODate('${toISODate(satDate)}'))" style="padding:8px 10px;font-size:12px;white-space:nowrap;">查看</button>
        </div>`);
      
      // 每周7天（第2-8列：周一到周日）
      for(let col=0; col<7; col++){
        // 计算这一天是几号（可能为负数或超过本月天数，表示上月或下月）
        const dayNum = 1 + weekStartOffset + col;
        
        let date;
        let muted = false;
        if(dayNum <= 0){
          // 上月的日期
          muted = true;
          date = new Date(y, m-1, prevDays + dayNum);
        }else if(dayNum > daysInMonth){
          // 下月的日期
          muted = true;
          date = new Date(y, m+1, dayNum - daysInMonth);
        }else{
          // 本月日期
          date = new Date(y, m, dayNum);
        }

        const dow = date.getDay();
        const isSat = dow === 6;
        const isSun = dow === 0;
        const isToday = isSameDay(date, today);
        const isSelected = state.selectedDate && isSameDay(date, state.selectedDate);

        let tag = '';
        if(isSat){
          tag = '';
        }else if(isSun){
          tag = ``;
        }

        const actions = '';

        const cls = ['day', muted ? 'muted' : '', isToday ? 'today' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
        cells.push(`
          <div class="${cls}" onclick="selectDate(parseISODate('${toISODate(date)}'))">
            <div class="num">${date.getDate()}</div>
            ${tag}
            ${actions}
          </div>`);
      }
    }

    el('cal').innerHTML = cells.join('');
  }

  function renderLists(){
    const sat = state.selectedSat;
    const anchor = parseISODate(state.cfg.anchorDate) || parseISODate(DEFAULT_ANCHOR_SAT);
    const a = normalizeNames(state.cfg.groupA);
    const b = normalizeNames(state.cfg.groupB);
    const myNames = state.cfg.myNames || [];
    const viewMode = state.cfg.viewMode || 'all';

    if(!sat || !anchor){
      el('selectedTitle').textContent = '请选择一个周六';
      el('selectedHint').textContent = '点击日历中的周六"查看"';
      el('workList').innerHTML = '';
      el('restList').innerHTML = '';
      el('workCount').textContent = '0 人';
      el('restCount').textContent = '0 人';
      return;
    }

    const rot = getRotation(anchor, sat);
    const work = rot.groupAIsResting ? b : a;
    const rest = rot.groupAIsResting ? a : b;

    // 检查选中的人在哪个组
    const myWorkNames = myNames.filter(n => work.includes(n));
    const myRestNames = myNames.filter(n => rest.includes(n));

    // 显示点击的具体日期和周数
    const clickedDate = state.selectedDate || sat;
    el('selectedTitle').textContent = formatCNDate(clickedDate);
    // 使用rot.weekIndex确保周六周日显示相同周数
    el('selectedHint').textContent = `第 ${rot.weekIndex + 1} 周`;

    if(viewMode === 'me' && myNames.length > 0){
      // 只看自己模式：根据人员休息状态动态显示
      const hasWork = myWorkNames.length > 0;
      const hasRest = myRestNames.length > 0;
      
      // 获取卡片元素
      const workCard = el('workCard');
      const restCard = el('restCard');
      const workList = el('workList');
      const restList = el('restList');
      const workCount = el('workCount');
      const restCount = el('restCount');
      
      // 生成人员列表HTML
      const makeItem = (name, label) => `
        <label class="item" style="background:linear-gradient(135deg, rgba(124,92,255,.15), rgba(124,92,255,.05));border-color:rgba(124,92,255,.3);">
          <input type="checkbox" checked disabled>
          <span style="font-weight:600">${escapeHtml(name)}</span>
          <span style="margin-left:auto;font-size:12px;color:var(--brand);">${label}</span>
        </label>`;
      
      // 根据人员状态决定显示
      if(hasRest && hasWork){
        // 同时有双休和单休：人数多的卡片在上
        restCard.style.display = 'flex';
        workCard.style.display = 'flex';
        
        // 根据人数决定顺序
        const parent = restCard.parentNode;
        if(myRestNames.length >= myWorkNames.length){
          // 双休人数多或相等，双休在上
          if(parent.children[0] === workCard){
            parent.insertBefore(restCard, workCard);
          }
        }else{
          // 单休人数多，单休在上
          if(parent.children[0] === restCard){
            parent.insertBefore(workCard, restCard);
          }
        }
        
        restCard.querySelector('.name').textContent = '双休';
        restCard.querySelector('.name').style.color = '#d8c4ff';
        restCount.textContent = `${myRestNames.length} 人`;
        restList.innerHTML = myRestNames.map(n => makeItem(n, '双休')).join('');
        
        workCard.querySelector('.name').textContent = '单休';
        workCard.querySelector('.name').style.color = '';
        workCount.textContent = `${myWorkNames.length} 人`;
        workList.innerHTML = myWorkNames.map(n => makeItem(n, '单休')).join('');
        
      }else if(hasRest && !hasWork){
        // 两人都是双休：只显示双休卡片
        restCard.style.display = 'flex';
        workCard.style.display = 'none';
        
        restCard.querySelector('.name').textContent = '双休';
        restCard.querySelector('.name').style.color = '#d8c4ff';
        restCount.textContent = `${myRestNames.length} 人`;
        restList.innerHTML = myRestNames.map(n => makeItem(n, '双休')).join('');
        
      }else if(!hasRest && hasWork){
        // 两人都是单休：只显示单休卡片
        restCard.style.display = 'none';
        workCard.style.display = 'flex';
        
        workCard.querySelector('.name').textContent = '单休';
        workCard.querySelector('.name').style.color = '';
        workCount.textContent = `${myWorkNames.length} 人`;
        workList.innerHTML = myWorkNames.map(n => makeItem(n, '单休')).join('');
        
      }else{
        // 无匹配人员：显示友好提示
        restCard.style.display = 'flex';
        workCard.style.display = 'flex';
        
        restCard.querySelector('.name').textContent = '双休';
        restCard.querySelector('.name').style.color = '#d8c4ff';
        restCount.textContent = '0 人';
        restList.innerHTML = '<div class="item" style="justify-content:center;color:var(--muted);font-size:13px;">本周您没有排班</div>';
        
        workCard.querySelector('.name').textContent = '单休';
        workCard.querySelector('.name').style.color = '';
        workCount.textContent = '0 人';
        workList.innerHTML = '<div class="item" style="justify-content:center;color:var(--muted);font-size:13px;">本周您没有排班</div>';
      }
    }else{
      // 全部模式
      el('workCard').style.display = 'flex';
      el('restCard').style.display = 'flex';
      
      // 根据设置决定是否显示多选工具栏
      const multiselectBar = el('multiselectBar');
      if(multiselectBar){
        multiselectBar.style.display = state.cfg.multiselect ? 'flex' : 'none';
      }
      
      // 排序函数：选中的人按myNames顺序排在前面，其余按原顺序
      const sortByMyNames = (arr) => {
        const mySet = new Set(myNames);
        const selected = arr.filter(n => mySet.has(n));
        const others = arr.filter(n => !mySet.has(n));
        // 按myNames中的顺序排列选中的人
        selected.sort((a, b) => myNames.indexOf(a) - myNames.indexOf(b));
        return [...selected, ...others];
      };
      
      const sortedWork = sortByMyNames(work);
      const sortedRest = sortByMyNames(rest);
      
      el('workCount').textContent = `${sortedWork.length} 人`;
      el('restCount').textContent = `${sortedRest.length} 人`;

      // 根据多选模式决定是否显示复选框
      const showCheckbox = state.cfg.multiselect;
      el('workList').innerHTML = sortedWork.map((name, idx) => `
        <label class="item">
          ${showCheckbox ? `<input type="checkbox" data-side="work" data-idx="${idx}" data-name="${escapeHtml(name)}" onchange="updateSelectedCount()">` : ''}
          <span>${escapeHtml(name)}</span>
        </label>`).join('');

      el('restList').innerHTML = sortedRest.map((name, idx) => `
        <label class="item">
          ${showCheckbox ? `<input type="checkbox" data-side="rest" data-idx="${idx}" data-name="${escapeHtml(name)}" onchange="updateSelectedCount()">` : ''}
          <span>${escapeHtml(name)}</span>
        </label>`).join('');
    }
    
    // 更新已选人数（仅在多选模式下）
    if(state.cfg.multiselect){
      updateSelectedCount();
    }
    
    // 更新按钮状态
    const allBtn = el('viewAllBtn');
    const meBtn = el('viewMeBtn');
    if(allBtn && meBtn){
      allBtn.className = `btn small ${viewMode === 'all' ? 'primary' : ''}`;
      meBtn.className = `btn small ${viewMode === 'me' ? 'primary' : ''}`;
    }
  }

  // 更新已选人数
  function updateSelectedCount(){
    const checkboxes = document.querySelectorAll('#workList input[type="checkbox"], #restList input[type="checkbox"]');
    const checked = document.querySelectorAll('#workList input[type="checkbox"]:checked, #restList input[type="checkbox"]:checked');
    const countEl = el('selectedCount');
    if(countEl) countEl.textContent = `已选 ${checked.length} 人`;
  }

  // 获取已选中的名字
  function getSelectedNames(){
    const checked = document.querySelectorAll('#workList input[type="checkbox"]:checked, #restList input[type="checkbox"]:checked');
    return Array.from(checked).map(cb => cb.dataset.name);
  }

  function selectDate(d){
    state.selectedDate = startOfDay(d);
    const satDate = findNearestSaturday(d);
    selectSaturday(satDate);
  }

  let resultsBarrageInited = false;

  function selectSaturday(d){
    state.selectedSat = startOfDay(d);
    state.cfg.lastSelected = toISODate(state.selectedSat);
    saveConfig(state.cfg);
    buildCalendar();
    renderLists();
    // 打开结果抽屉
    const resultsDrawer = el('resultsDrawer');
    const resultsDrawerOverlay = el('resultsDrawerOverlay');
    if(resultsDrawer && resultsDrawerOverlay){
      resultsDrawer.classList.add('open');
      resultsDrawerOverlay.classList.add('open');
      if(!resultsBarrageInited){
        initResultsBarrage();
        resultsBarrageInited = true;
      }
    }
  }

  function init(){
    buildDow();
    applyConfigToUI();
    initBarrage(); // 初始化全屏弹幕
    initCardBarrages(); // 初始化卡片弹幕
    updateProgress(); // 初始化进度指示器
    updateWeather(); // 初始化天气卡片
    updateSalaryCountdown(); // 初始化发薪日倒计时
    state.salaryTimer = setInterval(updateSalaryCountdown, 1000); // 每秒更新倒计时

    const anchor = parseISODate(state.cfg.anchorDate) || parseISODate(DEFAULT_ANCHOR_SAT);
    if(anchor && anchor.getDay() !== 6){
      const fixed = findNearestSaturday(anchor);
      state.cfg.anchorDate = toISODate(fixed);
      saveConfig(state.cfg);
    }

    buildCalendar();
    renderLists();

    el('prevMonth').addEventListener('click', () => {
      const d = new Date(state.viewYear, state.viewMonth-1, 1);
      state.viewYear = d.getFullYear();
      state.viewMonth = d.getMonth();
      buildCalendar();
      updateSalaryCountdown();
    });
    el('nextMonth').addEventListener('click', () => {
      const d = new Date(state.viewYear, state.viewMonth+1, 1);
      state.viewYear = d.getFullYear();
      state.viewMonth = d.getMonth();
      buildCalendar();
      updateSalaryCountdown();
    });
    // 月份标签点击回到当前月份
    el('monthLabel').addEventListener('click', () => {
      const d = new Date();
      state.viewYear = d.getFullYear();
      state.viewMonth = d.getMonth();
      buildCalendar();
      updateSalaryCountdown();
    });
    el('goToday').addEventListener('click', () => {
      const d = new Date();
      state.viewYear = d.getFullYear();
      state.viewMonth = d.getMonth();
      buildCalendar();
      updateSalaryCountdown();
      // 自动查看今天所在的周六
      const today = startOfDay(d);
      const satDate = findNearestSaturday(today);
      selectSaturday(satDate);
    });

    // 抽屉弹窗控制
    const drawer = el('settingsDrawer');
    const overlay = el('drawerOverlay');
    let settingsBarrageInited = false;
    
    function openDrawer(){
      drawer.style.transform = 'translateX(0)';
      overlay.style.opacity = '1';
      overlay.style.visibility = 'visible';
      if(!settingsBarrageInited){
        initSettingsBarrage();
        settingsBarrageInited = true;
      }
    }
    
    function closeDrawer(){
      drawer.style.transform = 'translateX(-100%)';
      overlay.style.opacity = '0';
      overlay.style.visibility = 'hidden';
    }
    
    el('settingsBtn').addEventListener('click', openDrawer);
    el('closeDrawerBtn').addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);

    // 结果抽屉控制
    const resultsDrawer = el('resultsDrawer');
    const resultsDrawerOverlay = el('resultsDrawerOverlay');
    
    function closeResultsDrawer(){
      resultsDrawer.classList.remove('open');
      resultsDrawerOverlay.classList.remove('open');
    }
    
    el('closeResultsDrawerBtn').addEventListener('click', closeResultsDrawer);
    resultsDrawerOverlay.addEventListener('click', closeResultsDrawer);

    // 多选功能事件监听
    el('selectAllBtn').addEventListener('click', () => {
      const checkboxes = document.querySelectorAll('#workList input[type="checkbox"], #restList input[type="checkbox"]');
      checkboxes.forEach(cb => cb.checked = true);
      updateSelectedCount();
    });
    
    el('clearSelectionBtn').addEventListener('click', () => {
      const checkboxes = document.querySelectorAll('#workList input[type="checkbox"]:checked, #restList input[type="checkbox"]:checked');
      checkboxes.forEach(cb => cb.checked = false);
      updateSelectedCount();
    });
    
    el('copySelectedBtn').addEventListener('click', () => {
      const selected = getSelectedNames();
      if(selected.length === 0){
        alert('请先选择人员');
        return;
      }
      const text = selected.join('\n');
      if(navigator.clipboard){
        navigator.clipboard.writeText(text).then(()=>alert(`已复制 ${selected.length} 人`)).catch(()=>fallbackCopy(text));
      }else{
        fallbackCopy(text);
      }
    });

    el('copyText').addEventListener('click', () => {
      const sat = state.selectedSat;
      const anchor = parseISODate(state.cfg.anchorDate) || parseISODate(DEFAULT_ANCHOR_SAT);
      if(!sat || !anchor){ alert('先选择一个周六'); return; }
      const a = normalizeNames(state.cfg.groupA);
      const b = normalizeNames(state.cfg.groupB);
      const rot = getRotation(anchor, sat);
      const work = rot.groupAIsResting ? b : a;
      const rest = rot.groupAIsResting ? a : b;
      const title = `${formatCNDate(sat)}`;
      const text = [
        title,
        '',
        '单休：',
        ...work.map(x => `- ${x}`),
        '',
        '双休：',
        ...rest.map(x => `- ${x}`)
      ].join('\n');

      if(navigator.clipboard){
        navigator.clipboard.writeText(text).then(()=>alert('已复制')).catch(()=>fallbackCopy(text));
      }else{
        fallbackCopy(text);
      }
    });
    
    // 保存选择的名字
    el('saveNameBtn').addEventListener('click', () => {
      const selectedChips = el('nameCarousel').querySelectorAll('.name-chip.selected');
      const selectedNames = Array.from(selectedChips).map(chip => chip.dataset.name);
      state.cfg.myNames = selectedNames;
      saveConfig(state.cfg);
      renderLists();
      alert(selectedNames.length > 0 ? `已保存 ${selectedNames.length} 人：${selectedNames.map(escapeHtml).join('、')}` : '已清除选择');
    });
    
    // 查看全部
    el('viewAllBtn').addEventListener('click', () => {
      state.cfg.viewMode = 'all';
      saveConfig(state.cfg);
      renderLists();
    });
    
    // 只看自己
    el('viewMeBtn').addEventListener('click', () => {
      const myNames = state.cfg.myNames || [];
      if(myNames.length === 0){
        alert('请先在设置中选择名字');
        return;
      }
      state.cfg.viewMode = 'me';
      saveConfig(state.cfg);
      renderLists();
    });
    
    el('reset').addEventListener('click', () => {
      if(!confirm('确定重置配置吗？（将清空本地保存的人员名单与锚点）')) return;
      resetConfig();
      state.cfg = loadConfig();
      applyConfigToUI();
      buildCalendar();
      state.selectedSat = null;
      renderLists();
    });

    // 恢复上次选择的日期但不自动打开手机端弹窗
    if(state.selectedSat){
      // 仅更新状态，不触发selectSaturday的手机端弹窗逻辑
      state.cfg.lastSelected = toISODate(state.selectedSat);
      saveConfig(state.cfg);
      buildCalendar();
      renderLists();
    }
  }

  function copyAsText(){
    const sat = state.selectedSat;
    const anchor = parseISODate(state.cfg.anchorDate) || parseISODate(DEFAULT_ANCHOR_SAT);
    if(!sat || !anchor){ alert('先选择一个周六'); return; }
    const a = normalizeNames(state.cfg.groupA);
    const b = normalizeNames(state.cfg.groupB);
    const rot = getRotation(anchor, sat);
    const work = rot.groupAIsResting ? b : a;
    const rest = rot.groupAIsResting ? a : b;
    const title = `${formatCNDate(sat)}`;
    const text = [
      title,
      '',
      '上班：',
      ...work.map(x => `- ${x}`),
      '',
      '休息：',
      ...rest.map(x => `- ${x}`)
    ].join('\n');

    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>alert('已复制')).catch(()=>fallbackCopy(text));
    }else{
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position='fixed';ta.left='-9999px';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');ta.remove();
    alert('已复制');
  }

  init();
</script>
</body>
</html>
